<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection - Mangot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Mangot</a>
            <div class="nav-links">
                <a href="search.html" class="nav-link">Search</a>
                <a href="register.html" class="nav-link">Add Book</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="collection-container">
            <div class="collection-header">
                <h1>My Collection</h1>
                <span id="book-count" class="book-count">0 books</span>
            </div>

            <div id="collections-container" class="collections-container">
                <!-- Sections will be rendered here -->
            </div>

            <div id="empty-state" class="empty-state">
                <p>Your collection is empty</p>
                <a href="register.html" class="cta">Add Your First Book</a>
            </div>

            <div id="loading-state" class="loading-state">
                <p>Loading your collection...</p>
            </div>
        </section>
    </main>

    <!-- Comments Modal -->
    <div id="comments-modal" class="modal">
        <div class="modal-content comments-modal-content">
            <div class="modal-header">
                <h2>Comments</h2>
                <button class="modal-close" id="comments-close">&times;</button>
            </div>
            <p class="comments-book-title" id="comments-book-title"></p>

            <div id="comments-list" class="comments-list">
                <!-- Comments will be rendered here -->
            </div>

            <form id="comment-form" class="comment-form">
                <textarea id="comment-text" placeholder="Write a comment..." required maxlength="500"></textarea>
                <div class="comment-form-footer">
                    <label class="spoiler-label">
                        <input type="checkbox" id="spoiler-toggle">
                        <span class="spoiler-checkbox"></span>
                        Mark as spoiler
                    </label>
                    <button type="submit" class="cta submit-btn" id="submit-comment">Post Comment</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Book</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <form id="edit-form" class="book-form">
                <input type="hidden" id="edit-book-id">

                <div class="form-group photo-upload">
                    <label for="edit-book-photo">Book Photo</label>
                    <div class="photo-preview" id="edit-photo-preview">
                        <span class="photo-placeholder">Click to change photo</span>
                        <img id="edit-preview-image" src="" alt="Book preview">
                    </div>
                    <input type="file" id="edit-book-photo" name="photo" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="edit-book-title">Title <span class="required">*</span></label>
                    <input type="text" id="edit-book-title" name="title" required placeholder="Enter book title">
                </div>

                <div class="form-group">
                    <label for="edit-book-author">Author <span class="required">*</span></label>
                    <input type="text" id="edit-book-author" name="author" required placeholder="Enter author name">
                </div>

                <div class="form-group">
                    <label for="edit-book-date">Date Acquired <span class="required">*</span></label>
                    <input type="date" id="edit-book-date" name="dateAcquired" required>
                </div>

                <div class="form-group">
                    <label for="edit-book-genre">Genre <span class="required">*</span></label>
                    <select id="edit-book-genre" name="genre" required>
                        <option value="">Select a genre</option>
                        <option value="Myth">Myth</option>
                        <option value="Romance">Romance</option>
                        <option value="Novel">Novel</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Biography">Biography</option>
                        <option value="Fairy Tale">Fairy Tale</option>
                        <option value="Drama">Drama</option>
                        <option value="History">History</option>
                        <option value="Western">Western</option>
                        <option value="Poems">Poems</option>
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Manga">Manga</option>
                        <option value="Horror">Horror</option>
                        <option value="Children">Children</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="edit-book-series">Series <span class="optional">(optional)</span></label>
                    <input type="text" id="edit-book-series" name="series" placeholder="Enter series name if applicable">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancel-edit">Cancel</button>
                    <button type="submit" class="cta submit-btn" id="save-edit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Mangot</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/collection.js"></script>
    <script>
        // Protect this route
        requireAuth();
    </script>
</body>
</html>
