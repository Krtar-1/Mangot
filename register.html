<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Book - Mangot</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Mangot</a>
            <div class="nav-links">
                <a href="search.html" class="nav-link">Search</a>
                <a href="collection.html" class="nav-link">My Collection</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h1>Register a Book</h1>
            <p class="form-description">Add a new book to your collection</p>

            <form id="book-form" class="book-form">
                <div class="form-group photo-upload">
                    <label for="book-photo">Book Photo</label>
                    <div class="photo-preview" id="photo-preview">
                        <span class="photo-placeholder">Click to upload photo</span>
                        <img id="preview-image" src="" alt="Book preview">
                    </div>
                    <input type="file" id="book-photo" name="photo" accept="image/*">
                </div>

                <div class="form-group">
                    <label for="book-title">Title <span class="required">*</span></label>
                    <input type="text" id="book-title" name="title" required placeholder="Enter book title">
                </div>

                <div class="form-group">
                    <label for="book-author">Author <span class="required">*</span></label>
                    <input type="text" id="book-author" name="author" required placeholder="Enter author name">
                </div>

                <div class="form-group">
                    <label for="book-date">Date Acquired <span class="required">*</span></label>
                    <input type="date" id="book-date" name="dateAcquired" required>
                </div>

                <div class="form-group">
                    <label for="book-genre">Genre <span class="required">*</span></label>
                    <select id="book-genre" name="genre" required>
                        <option value="">Select a genre</option>
                        <option value="Myth">Myth</option>
                        <option value="Romance">Romance</option>
                        <option value="Novel">Novel</option>
                        <option value="Fiction">Fiction</option>
                        <option value="Biography">Biography</option>
                        <option value="Fairy Tale">Fairy Tale</option>
                        <option value="Drama">Drama</option>
                        <option value="History">History</option>
                        <option value="Western">Western</option>
                        <option value="Poems">Poems</option>
                        <option value="Non-Fiction">Non-Fiction</option>
                        <option value="Manga">Manga</option>
                        <option value="Horror">Horror</option>
                        <option value="Children">Children</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="book-series">Series <span class="optional">(optional)</span></label>
                    <input type="text" id="book-series" name="series" placeholder="Enter series name if applicable">
                </div>

                <button type="submit" class="cta submit-btn">Add to Collection</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mangot</p>
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-guard.js"></script>
    <script>
        // Protect this route
        requireAuth();
    </script>
    <script src="register.js"></script>
</body>
</html>
